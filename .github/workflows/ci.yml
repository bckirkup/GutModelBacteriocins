name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    name: Unit tests (Release)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y cmake libopenmpi-dev openmpi-bin libhdf5-mpi-dev

      - name: Configure
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DGUTIBM_USE_MPI=ON \
            -DGUTIBM_USE_HDF5=ON \
            -DGUTIBM_USE_OPENMP=OFF

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Fast unit tests
        run: |
          cd build
          ctest -L unit -LE slow --output-on-failure --parallel $(nproc)

  integration-tests:
    name: Integration tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y cmake libopenmpi-dev openmpi-bin libhdf5-mpi-dev

      - name: Configure
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DGUTIBM_USE_MPI=ON \
            -DGUTIBM_USE_HDF5=ON \
            -DGUTIBM_USE_OPENMP=OFF

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Integration + slow unit tests
        run: |
          cd build
          ctest -L 'integration|slow' -LE gpu --output-on-failure --parallel 2

  openmp-parity:
    name: OpenMP parity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y cmake libopenmpi-dev openmpi-bin libhdf5-mpi-dev

      - name: Compare serial vs OpenMP fingerprints
        run: bash scripts/compare_openmp_parity.sh

  cuda-compile:
    name: CUDA build + GPU tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y cmake libopenmpi-dev openmpi-bin libhdf5-mpi-dev nvidia-cuda-toolkit

      - name: Configure with CUDA
        run: |
          cmake -B build-cuda \
            -DCMAKE_BUILD_TYPE=Release \
            -DGUTIBM_USE_MPI=ON \
            -DGUTIBM_USE_HDF5=ON \
            -DGUTIBM_USE_CUDA=ON

      - name: Build
        run: cmake --build build-cuda -j$(nproc)

      - name: GPU tests
        run: cd build-cuda && ctest -L gpu --output-on-failure

      - name: GPU parity script
        run: bash scripts/compare_gpu_parity.sh

  eari-vadi-validation:
    name: EARI/VADI regression
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y cmake libopenmpi-dev openmpi-bin libhdf5-mpi-dev

      - name: EARI/VADI validation regression
        run: bash scripts/validate_eari_vadi.sh

  python-lint:
    name: Python lint + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          pip install ruff pytest
          pip install -e "python/.[dev,viz]"

      - name: Validate config JSON syntax
        run: bash scripts/validate_config_json.sh

      - name: Ruff check
        run: ruff check python/

      - name: Import check
        run: python -c "from gut_ibm_tools import GutIBMData, validation, analysis; print('gut_ibm_tools OK')"
        working-directory: python

      - name: Pytest (fast)
        run: pytest tests/ -v -m "not integration"
        working-directory: python
